<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reverso Carnet Tech</title>
  <link rel="stylesheet" href="/static/cards/card_tech.css" />
</head>
<body
  style="
    --primary: {{ center_primary_color or '#000000' }};
    --secondary: {{ center_secondary_color or '#111111' }};
    --accent: {{ center_accent_color or '#22c55e' }};
    --text: {{ center_text_color or '#e5eefb' }};
    --bg: #000000;
  "
>
  <div class="id-card tech-card tech-card-back-black">
    <div class="grid-overlay"></div>
    <div class="glow glow-left"></div>
    <div class="glow glow-right"></div>

    <div class="card-inner back-tech-layout back-tech-layout-v2">
      <header class="back-tech-logo-wrap">
        {% if center_logo_url %}
          <img src="{{ center_logo_url }}" alt="Logo del centro" class="back-tech-logo-only" />
        {% endif %}
      </header>

      <section class="tech-panels tech-panels-v2">
        <div class="panel panel-unified-text panel-unified-text-v2 panel-unified-text-v2-lg panel-unified-text-v2-black">
          <div class="panel-text-block">
            <span class="panel-title">Misión</span>
            <p>{{ mission or "-" }}</p>
          </div>

          <div class="panel-text-block">
            <span class="panel-title">Visión</span>
            <p>{{ vision or "-" }}</p>
          </div>

          <div class="panel-text-block">
            <span class="panel-title">Valores</span>
            <p>{{ values or "-" }}</p>
          </div>
        </div>

        <div class="panel panel-loss panel-loss-v2 panel-loss-black">
          <p>{{ card_loss_notice }}</p>
          <p>{{ card_loss_contact }}</p>
        </div>
      </section>

      <footer class="tech-bottom-note">
        <p>{{ card_footer_text or 'by Aula Nova' }}</p>
      </footer>
    </div>
  </div>
</body>
</html>
