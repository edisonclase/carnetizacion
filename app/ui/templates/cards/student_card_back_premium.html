<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reverso Carnet Premium</title>
  <link rel="stylesheet" href="/static/cards/card_premium.css" />
</head>
<body
  style="
    --primary: {{ center_primary_color or '#0b3d24' }};
    --secondary: {{ center_secondary_color or '#1f8f4a' }};
    --accent: {{ center_accent_color or '#f4c95d' }};
    --text: {{ center_text_color or '#1e1e1e' }};
    --bg: {{ center_background_color or '#f7f8f7' }};
  "
>
  <div class="id-card premium-card premium-back premium-back-clean">
    <div class="premium-shape premium-shape-top"></div>
    <div class="premium-shape premium-shape-bottom"></div>

    <div class="card-inner back-layout back-layout-clean">
      <header class="back-center-logo-wrap">
        {% if center_logo_url %}
          <img src="{{ center_logo_url }}" alt="Logo del centro" class="back-center-logo-only back-center-logo-only-lg" />
        {% endif %}
      </header>

      <section class="back-info-panel back-info-panel-centered back-info-panel-centered-lg">
        <div class="back-identity-text-block">
          <div class="back-single-section">
            <h3>Misión</h3>
            <p>{{ mission or "-" }}</p>
          </div>

          <div class="back-single-section">
            <h3>Visión</h3>
            <p>{{ vision or "-" }}</p>
          </div>

          <div class="back-single-section">
            <h3>Valores</h3>
            <p>{{ values or "-" }}</p>
          </div>
        </div>
      </section>

      <section class="loss-contact-box loss-contact-box-low">
        <p>{{ card_loss_notice }}</p>
        <p>{{ card_loss_contact }}</p>
      </section>

      <footer class="card-footer premium-footer back-footer">
        <p class="footer-sign">{{ card_footer_text or 'by Aula Nova' }}</p>
      </footer>
    </div>
  </div>
</body>
</html>
