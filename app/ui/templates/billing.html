<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Facturación - Nova ID</title>
    <link rel="stylesheet" href="/static/dashboard.css">
    <link rel="stylesheet" href="/static/billing.css">
</head>
<body>

<div class="dashboard-container">

    <!-- HEADER -->
    <header class="dashboard-header">
        <h1>💰 Módulo de Facturación</h1>
        <div id="userInfo"></div>
    </header>

    <!-- ACCIONES -->
    <section class="billing-actions">
        <button id="btnNuevaFactura">+ Nueva Factura</button>
        <button id="btnRefrescar">Actualizar</button>
    </section>

    <!-- FILTROS -->
    <section class="billing-filters">
        <input type="number" id="filterCenterId" placeholder="ID Centro">
        <select id="filterStatus">
            <option value="">Todos</option>
            <option value="pending">Pendiente</option>
            <option value="partial">Parcial</option>
            <option value="paid">Pagado</option>
        </select>
        <button id="btnFiltrar">Filtrar</button>
    </section>

    <!-- TABLA -->
    <section class="billing-table">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Factura</th>
                    <th>Centro</th>
                    <th>Total</th>
                    <th>Pagado</th>
                    <th>Pendiente</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="billingTableBody">
            </tbody>
        </table>
    </section>

</div>

<script src="/static/auth.js"></script>
<script src="/static/billing.js"></script>
</body>
</html>
