<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Registro de Personal</title>
    <link rel="stylesheet" href="/static/staff_register.css" />
</head>
<body>

<div class="register-shell">

    <aside class="register-sidebar">
        <div class="brand-block">
            <h1>Nova ID</h1>
            <p>Gestión institucional</p>
            <span class="brand-caption">Registro de personal del centro educativo</span>
        </div>

        <nav class="sidebar-nav">
            <a href="/dashboard">Dashboard</a>
            <a href="/admin/staff/register" class="active">Registrar personal</a>
            <a href="/admin/staff">Listado de personal</a>
        </nav>
    </aside>

    <main class="register-main">
        <header class="page-header">
            <div>
                <h2>Registro de Personal</h2>
                <p>Complete la información del personal docente, administrativo o de apoyo.</p>
            </div>
        </header>

        <form id="staffForm" class="register-form">

            <section class="register-card">
                <div class="card-title-row">
                    <h3>Datos personales</h3>
                    <span>Información básica del colaborador</span>
                </div>

                <div class="form-grid two-cols">
                    <div class="field">
                        <label for="first_name">Nombre</label>
                        <input type="text" id="first_name" required />
                    </div>

                    <div class="field">
                        <label for="last_name">Apellido</label>
                        <input type="text" id="last_name" required />
                    </div>

                    <div class="field">
                        <label for="staff_code">Código</label>
                        <input type="text" id="staff_code" required />
                    </div>

                    <div class="field">
                        <label for="national_id">Cédula</label>
                        <input type="text" id="national_id" />
                    </div>

                    <div class="field">
                        <label for="gender">Sexo</label>
                        <select id="gender" required>
                            <option value="">Seleccione</option>
                            <option value="masculino">Masculino</option>
                            <option value="femenino">Femenino</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="staff_group">Grupo</label>
                        <select id="staff_group">
                            <option value="administrativo">Administrativo</option>
                            <option value="apoyo">Apoyo</option>
                            <option value="docente_tecnico">Docente / Técnico</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="staff_position">Cargo</label>
                        <input type="text" id="staff_position" required />
                    </div>

                    <div class="field">
                        <label for="department">Departamento</label>
                        <input type="text" id="department" />
                    </div>

                    <div class="field">
                        <label for="is_active">Estado</label>
                        <select id="is_active">
                            <option value="true">Activo</option>
                            <option value="false">Inactivo</option>
                        </select>
                    </div>

                    <div class="field field-span-2">
                        <label for="photo">Foto del personal</label>
                        <input type="file" id="photo" accept="image/*" />
                    </div>
                </div>
            </section>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Guardar personal</button>
            </div>

        </form>
    </main>

</div>

<script src="/static/auth.js"></script>
<script src="/static/staff_register.js"></script>

</body>
</html>
