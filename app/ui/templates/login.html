<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión - Nova ID</title>
    <link rel="stylesheet" href="/static/login.css" />
</head>
<body>
    <main class="login-shell">
        <section class="login-card">
            <div class="login-brand">
                <h1>Nova ID</h1>
                <p>by Aula Nova</p>
                <span>Acceso seguro al sistema</span>
            </div>

            <div id="loginAlert" class="login-alert hidden" role="alert" aria-live="polite"></div>

            <form id="loginForm" class="login-form">
                <div class="field">
                    <label for="email">Correo</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="usuario@centro.edu.do"
                        autocomplete="username"
                        required
                    />
                </div>

                <div class="field">
                    <label for="password">Contraseña</label>

                    <div class="password-input-wrap">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Ingresa tu contraseña"
                            autocomplete="current-password"
                            required
                        />

                        <button
                            type="button"
                            id="togglePasswordBtn"
                            class="toggle-password-btn"
                            aria-label="Mostrar contraseña"
                            aria-pressed="false"
                            title="Mostrar contraseña"
                        >
                            👁️
                        </button>
                    </div>
                </div>

                <button type="submit" id="loginBtn" class="btn-login">
                    Iniciar sesión
                </button>
            </form>

            <div class="login-help">
                <p>¿Olvidaste tu contraseña o tu correo de acceso?</p>
                <small>
                    Solicita apoyo al administrador principal de Nova ID o al equipo autorizado de registro.
                </small>
            </div>

            <div class="login-footer">
                <small>Nova ID · Sistema de carnetización, acceso y analítica institucional</small>
            </div>
        </section>
    </main>

    <script src="/static/auth.js"></script>
    <script src="/static/login.js"></script>
</body>
</html>
