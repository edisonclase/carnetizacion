<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reverso del Carnet</title>
    <link rel="stylesheet" href="/static/student_card.css" />
</head>
<body class="card-body">
    <article
        class="card card-back"
        style="
            --card-bg: {{ center_background_color or '#ffffff' }};
            --card-text: {{ center_text_color or '#1e293b' }};
            --card-primary: {{ center_primary_color or '#1f8f4a' }};
            --card-secondary: {{ center_secondary_color or '#0b3d24' }};
            --card-accent: {{ center_accent_color or '#f4c95d' }};
        "
    >
        <div class="card-topbar"></div>

        <header class="card-brand-header card-brand-header-back">
            <div class="card-logo-badge">
                {% if center_logo_url %}
                <img
                    src="{{ center_logo_url }}"
                    alt="Logo del centro"
                    class="center-logo"
                />
                {% else %}
                <div class="center-logo center-logo-placeholder"></div>
                {% endif %}
            </div>

            <div class="card-brand-copy card-brand-copy-back">
                <h1>{{ center_name }}</h1>
                <p class="header-card-title">Información institucional</p>
            </div>
        </header>

        <div class="card-back-content">
            <section class="back-section">
                <h3>Filosofía</h3>
                <p>{{ philosophy or "-" }}</p>
            </section>

            <section class="back-section">
                <h3>Misión</h3>
                <p>{{ mission or "-" }}</p>
            </section>

            <section class="back-section">
                <h3>Visión</h3>
                <p>{{ vision or "-" }}</p>
            </section>

            <section class="back-section">
                <h3>Valores</h3>
                <p>{{ values or "-" }}</p>
            </section>
        </div>

        <footer class="card-footer card-footer-back">
            <span>{{ card_footer_text }}</span>
        </footer>
    </article>
</body>
</html>
