<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reverso del Carnet</title>
    <link rel="stylesheet" href="/static/student_card.css" />
</head>
<body class="card-body">
    <div
        class="card card-back"
        style="
            background: {{ center_background_color or '#ffffff' }};
            color: {{ center_text_color or '#1e293b' }};
            border-color: {{ center_accent_color or '#dbe4f0' }};
        "
    >
        <div
            class="card-header back-simple-header"
            style="background: {{ center_primary_color or '#2563eb' }};"
        >
            <h1>{{ center_name }}</h1>
        </div>

        <div class="card-back-content">
            <section>
                <h3>Filosofía</h3>
                <p>{{ philosophy or "-" }}</p>
            </section>

            <section>
                <h3>Misión</h3>
                <p>{{ mission or "-" }}</p>
            </section>

            <section>
                <h3>Visión</h3>
                <p>{{ vision or "-" }}</p>
            </section>

            <section>
                <h3>Valores</h3>
                <p>{{ values or "-" }}</p>
            </section>
        </div>

        <div
            class="card-footer"
            style="
                background: {{ center_background_color or '#f8fafc' }};
                border-top-color: {{ center_accent_color or '#e2e8f0' }};
                color: {{ center_text_color or '#475569' }};
            "
        >
            <span>by Aula Nova</span>
        </div>
    </div>
</body>
</html>
