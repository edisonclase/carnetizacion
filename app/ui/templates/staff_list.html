<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listado de Personal - Nova ID</title>
    <link rel="stylesheet" href="/static/sidebar.css" />
    <link rel="stylesheet" href="/static/student_list.css" />
</head>
<body>
<div class="student-list-shell">

    {% include "partials/sidebar.html" %}

    <main class="student-list-main">
        <header class="page-header">
            <h2>Listado de Personal</h2>
        </header>

        <section class="list-card">
            <div class="card-title-row">
                <h3>Filtros</h3>
            </div>

            <div class="filters-grid">
                <div class="field">
                    <label>Grupo</label>
                    <select id="groupFilter">
                        <option value="">Todos</option>
                        <option value="administrativo">Administrativo</option>
                        <option value="apoyo">Apoyo</option>
                        <option value="docente_tecnico">Docente/Técnico</option>
                    </select>
                </div>

                <div class="field">
                    <label>Departamento</label>
                    <input type="text" id="deptFilter" />
                </div>

                <div class="field">
                    <label>Estado</label>
                    <select id="activeFilter">
                        <option value="">Todos</option>
                        <option value="true">Activo</option>
                        <option value="false">Inactivo</option>
                    </select>
                </div>
            </div>

            <div class="filter-actions">
                <button class="btn btn-primary" onclick="applyFilters()">Filtrar</button>
                <button class="btn btn-secondary" onclick="clearFilters()">Limpiar</button>
            </div>
        </section>

        <section class="list-card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Nombre</th>
                            <th>Grupo</th>
                            <th>Cargo</th>
                            <th>Departamento</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="staffTable">
                        <tr>
                            <td colspan="7">Cargando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>
</div>

<script src="/static/auth.js"></script>
<script src="/static/sidebar.js"></script>
<script src="/static/staff_list.js"></script>
</body>
</html>
